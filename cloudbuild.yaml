steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ombres-du-son-web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ombres-du-son-web:latest'
      - '.'
    timeout: 600s

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ombres-du-son-web:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ombres-du-son-web:latest'

  # Deploy to Cloud Run (staging)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ombres-du-son-web-staging'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ombres-du-son-web:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=staging'
    id: 'deploy-staging'
    waitFor: ['-']

  # Deploy to Cloud Run (production) - only on main branch
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ombres-du-son-web-production'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ombres-du-son-web:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '100'
      - '--set-env-vars'
      - 'NODE_ENV=production'
    id: 'deploy-production'
    waitFor: ['deploy-staging']

images:
  - 'gcr.io/$PROJECT_ID/ombres-du-son-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ombres-du-son-web:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

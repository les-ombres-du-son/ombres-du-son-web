<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .logo-text { font-family: 'Arial Black', sans-serif; font-weight: 900; }
    </style>
  </defs>
  
  <!-- Head silhouette with sound waves -->
  <g transform="translate(30, 60)">
    <!-- Head profile -->
    <path d="M 20 0 Q 0 20, 0 50 Q 0 70, 10 80 L 10 90 L 30 90 L 30 80 Q 35 75, 35 60 L 35 30 Q 35 10, 25 5 Z" fill="black"/>
    
    <!-- Sound waves -->
    <path d="M 40 30 Q 45 30, 50 30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 40 40 Q 48 40, 55 40" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 40 50 Q 50 50, 60 50" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Eye with slash (infinity symbol style) -->
  <g transform="translate(110, 80)">
    <circle r="35" fill="black"/>
    <!-- Eye shape -->
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="white"/>
    <!-- Slash -->
    <line x1="-25" y1="-25" x2="25" y2="25" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Text: LES OMBRES DU SON -->
  <text x="100" y="170" text-anchor="middle" class="logo-text" font-size="16" fill="black">
    LES OMBRES DU SON
  </text>
</svg>

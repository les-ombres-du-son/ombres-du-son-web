# SonarQube Configuration for Astro/TypeScript Project

sonar.projectKey=les-ombres-du-son_ombres-du-son-web
sonar.organization=les-ombres-du-son

# Project metadata
sonar.projectName=Les Ombres du Son - Web
sonar.projectVersion=1.0

# Source code
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/.astro/**,**/public/**,**/*.config.*

# Language
sonar.language=ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.*

# Quality Gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
